[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = --cov=src --cov=agents --cov-report=term-missing --cov-fail-under=80 -v
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests
    skip_ci: Skip in CI
