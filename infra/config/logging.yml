version: 1
disable_existing_loggers: false

formatters:
  default:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  json:
    class: pythonjsonlogger.jsonlogger.JsonFormatter
    format: '%(asctime)s %(name)s %(levelname)s %(message)s'

handlers:
  console:
    class: logging.StreamHandler
    formatter: default
    level: DEBUG
    stream: ext://sys.stdout
  
  file:
    class: logging.handlers.RotatingFileHandler
    filename: /var/log/mega-quixai/app.log
    maxBytes: 104857600
    backupCount: 10
    formatter: json
    level: INFO
  
  agent_file:
    class: logging.handlers.RotatingFileHandler
    filename: /var/log/mega-quixai/agents.log
    maxBytes: 104857600
    backupCount: 10
    formatter: json
    level: DEBUG

loggers:
  agents:
    level: DEBUG
    handlers: [agent_file]
  
  api:
    level: INFO
    handlers: [console, file]

root:
  level: INFO
  handlers: [console, file]
