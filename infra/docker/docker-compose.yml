version: '3.8'

services:
  # Reverse Proxy + SSL Termination
  nginx:
    image: nginx:1.25-alpine
    container_name: mega-quixai-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    environment:
      - TZ=UTC
    restart: unless-stopped
    networks:
      - mega-quixai
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      api:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # FastAPI Application Server
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: mega-quixai-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=mega_quixai
      - POSTGRES_USER=quixai_user
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LANGFUSE_HOST=http://langfuse:3000
      - TZ=UTC
    secrets:
      - pg_password
      - langfuse_secret
      - anthropic_key
    volumes:
      - app_logs:/var/log/mega-quixai
      - ./config:/app/config:ro
    restart: unless-stopped
    networks:
      - mega-quixai
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # PostgreSQL + pgvector
  postgres:
    image: pgvector/pgvector:0.7.0-pg15
    container_name: mega-quixai-postgres
    environment:
      - POSTGRES_DB=mega_quixai
      - POSTGRES_USER=quixai_user
      - POSTGRES_PASSWORD_FILE=/run/secrets/pg_password
      - TZ=UTC
    secrets:
      - pg_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./pgvector_init.sql:/docker-entrypoint-initdb.d/02-pgvector.sql:ro
      - pg_logs:/var/log/postgresql
    restart: unless-stopped
    networks:
      - mega-quixai
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quixai_user -d mega_quixai"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Redis Cache + Queue
  redis:
    image: redis:7-alpine
    container_name: mega-quixai-redis
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
      - redis_logs:/var/log/redis
    restart: unless-stopped
    networks:
      - mega-quixai
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # LangFuse (Observabilité LLM)
  langfuse:
    image: ghcr.io/langfuse/langfuse:latest
    container_name: mega-quixai-langfuse
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgresql://quixai_user:${POSTGRES_PASSWORD}@postgres:5432/langfuse_db
      - NEXTAUTH_SECRET=${LANGFUSE_SECRET}
      - NODE_ENV=production
      - TZ=UTC
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mega-quixai
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

networks:
  mega-quixai:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_logs:
    driver: local
  app_logs:
    driver: local
  pg_logs:
    driver: local
  redis_logs:
    driver: local

secrets:
  pg_password:
    file: ./.secrets/pg_password.txt
  langfuse_secret:
    file: ./.secrets/langfuse_secret.txt
  anthropic_key:
    file: ./.secrets/anthropic_key.txt
